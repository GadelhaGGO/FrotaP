            --text: #333;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }

        .setup-box { background: #e9ecef; padding: 20px; border-radius: 10px; text-align: center; }
        .btn { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-start { background: var(--primary); color: white; margin-top: 15px; }
        .btn-start:hover { background: #003366; }
        .quiz-area { display: none; }
        .question-card { background: #fff; border: 1px solid #ddd; padding: 20px; margin-bottom: 20px; border-radius: 8px; border-left: 5px solid var(--primary); }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .opt-btn { background: #f8f9fa; border: 1px solid #ccc; padding: 10px; border-radius: 5px; cursor: pointer; text-align: left; }
        .opt-btn:hover { background: #e2e6ea; }
        .opt-btn.selected { background: #004a99; color: white; border-color: #004a99; }
        .results { display: none; }
        .correction-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .correct-text { color: var(--success); font-weight: bold; }
        .wrong-text { color: var(--error); font-weight: bold; text-decoration: line-through; }
        .expl { background: #fdfbbe; padding: 10px; border-radius: 5px; font-size: 14px; margin-top: 10px; border-left: 3px solid #f1c40f; }
        @media print { .btn, .setup-box { display: none; } }
    </style>
</head>

    let activeQuestions = [];
    let answers = [];

    function startQuiz() {
        const qty = parseInt(document.getElementById('diff-select').value);
        activeQuestions = db.sort(() => 0.5 - Math.random()).slice(0, qty);
        answers = new Array(qty).fill(null);

        const list = document.getElementById('questions-list');
        list.innerHTML = '';
        
        activeQuestions.forEach((q, i) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <p><strong>Questão ${i+1}:</strong> ${q.q}</p>
                <div class="options" id="options-${i}">
                    ${q.options.map((opt, idx) => `
                        <div class="opt-btn" onclick="selectOption(${i}, ${idx})">${opt}</div>
                    `).join('')}
                </div>
            `;
            list.appendChild(card);
        });

        document.getElementById('setup').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        window.scrollTo(0,0);
    }

    function selectOption(qIdx, optIdx) {
        answers[qIdx] = optIdx;
        const btns = document.getElementById(`options-${qIdx}`).querySelectorAll('.opt-btn');
        btns.forEach(b => b.classList.remove('selected'));
        btns[optIdx].classList.add('selected');
    }

    function finishQuiz() {
        if(answers.includes(null)) {
            if(!confirm("Você não respondeu todas as questões. Deseja finalizar assim mesmo?")) return;
        }

        let score = 0;
        const details = document.getElementById('details');
        details.innerHTML = '<h2>Correção:</h2>';

        activeQuestions.forEach((q, i) => {
            const isCorrect = answers[i] === q.correct;
            if(isCorrect) score++;

            const div = document.createElement('div');
            div.className = 'correction-item';
            div.innerHTML = `
                <p><strong>${i+1}. ${q.q}</strong></p>
                <p>Sua resposta: <span class="${isCorrect ? 'correct-text' : 'wrong-text'}">
                    ${answers[i] !== null ? q.options[answers[i]] : 'Em branco'}
                </span></p>
                ${!isCorrect ? `<p>Resposta correta: <span class="correct-text">${q.options[q.correct]}</span></p>` : ''}
                <div class="expl"><strong>Explicação:</strong> ${q.explanation}</div>
            `;
            details.appendChild(div);
        });

        const percent = Math.round((score/activeQuestions.length)*100);
        document.getElementById('score-summary').innerHTML = `
            Você acertou <strong>${score}</strong> de <strong>${activeQuestions.length}</strong> questões.<br>
            Aproveitamento: <strong>${percent}%</strong>
        `;

        document.getElementById('quiz').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        window.scrollTo(0,0);
    }
</script>

</body>
</html>
